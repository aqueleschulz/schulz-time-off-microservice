version: '3.8'

services:
  time-off-app:
    build: 
      context: .
      dockerfile: .dockerfile
    container_name: time-off-microservice
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HCM_BASE_URL=http://hcm-mock:9999
      - DATABASE_URL=file:/usr/src/app/data/time-off.db
    volumes:
      # Using a named volume to bypass host-level permission issues with SQLite
      - sqlite_data:/usr/src/app/data
    depends_on:
      - hcm-mock
    networks:
      - hr-network

  hcm-mock:
    build:
      context: .
      dockerfile: .dockerfile
    container_name: hcm-mock-server
    # Execute the pre-built distribution file directly instead of mounting 
    # the entire workspace and running npm install on startup
    command: ["node", "dist/test/integration/hcm-mock-server/start-mock.js"]
    ports:
      - "9999:9999"
    networks:
      - hr-network

volumes:
  sqlite_data:

networks:
  hr-network:
    driver: bridge