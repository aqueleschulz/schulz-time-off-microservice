name: Time-Off Microservice CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-assurance:
    name: Lint & Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        # npm ci is used here to ensure a clean, idempotent install 
        # based strictly on the package-lock.json
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Unit & Property Tests
        run: npm run test

      - name: Run E2E Tests (with Network Simulator)
        run: npm run test:e2e

  docker-verification:
    name: Docker Build Check
    runs-on: ubuntu-latest
    # This dependency ensures Docker images are only built 
    # if the application logic passes all quality gates
    needs: quality-assurance

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Docker Compose Build
        # Workaround for CI environment constraints:
        # Using 'docker compose' instead of the legacy 'docker-compose' 
        # to avoid the 'command not found' (exit code 127) error 
        # in modern GitHub runners.
        run: docker compose build