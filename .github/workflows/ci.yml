name: Time-Off Microservice CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-assurance:
    name: Lint & Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Alinhado com a nossa imagem Alpine
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Unit & Property Tests
        run: npm run test

      - name: Run E2E Tests (with Network Simulator)
        run: npm run test:e2e

  docker-verification:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: quality-assurance

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Docker Compose Build
        run: docker-compose build